name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: verify (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
            pg_smoke: false
          - backend: postgres
            pg_smoke: true

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: pawpaw_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pawpaw_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate both migration packs
        run: npm run db:generate

      - name: Fail on uncommitted migration drift
        run: git diff --exit-code -- src/db/migrations drizzle.config.ts drizzle.pg.config.ts

      - name: Verify default SQLite-backed path
        run: npm run verify

      - name: Wait for Postgres service
        if: matrix.pg_smoke
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/pawpaw_ci
        run: |
          node --input-type=module -e "import pg from 'pg'; const { Client } = pg; const url = process.env.DATABASE_URL; let lastError = null; for (let attempt = 1; attempt <= 30; attempt += 1) { try { const client = new Client({ connectionString: url }); await client.connect(); await client.end(); process.exit(0); } catch (error) { lastError = error; await new Promise((resolve) => setTimeout(resolve, 1000)); } } console.error(lastError); process.exit(1);"

      - name: Postgres migration smoke
        if: matrix.pg_smoke
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/pawpaw_ci
        run: |
          node src/db/migrate.js
          node src/db/migrate.js
          node --input-type=module -e "import assert from 'node:assert/strict'; import pg from 'pg'; const { Client } = pg; const client = new Client({ connectionString: process.env.DATABASE_URL }); await client.connect(); const { rows } = await client.query(\"select table_name from information_schema.tables where table_schema = 'public' and table_name in ('__drizzle_migrations', 'track_likes', 'track_plays', 'tracks', 'users') order by table_name\"); await client.end(); assert.deepEqual(rows.map((row) => row.table_name), ['__drizzle_migrations', 'track_likes', 'track_plays', 'tracks', 'users']);"
