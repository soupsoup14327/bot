<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #dbe3ea; stroke-width: 2; rx: 24; ry: 24; }
      .panel { fill: #fbfdff; stroke: #d6dde6; stroke-width: 2; rx: 20; ry: 20; }
      .ui { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 14; ry: 14; }
      .run { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 14; ry: 14; }
      .search { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 14; ry: 14; }
      .data { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 14; ry: 14; }
      .db { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 14; ry: 14; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .section { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .text { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #475569; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrowSoft); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1260"/>
  <rect class="frame" x="18" y="18" width="1764" height="1224"/>

  <text x="48" y="60" class="title">PAWPAW — architecture overview</text>
  <text x="48" y="88" class="subtitle">Актуальная схема по коду: Discord/UI, orchestration, autoplay/search, data layer и таблицы БД.</text>

  <!-- Runtime area -->
  <rect class="panel" x="38" y="120" width="1724" height="560"/>
  <text x="58" y="154" class="section">1. Runtime flow</text>

  <!-- Column 1 -->
  <rect class="ui" x="70" y="200" width="220" height="92"/>
  <text x="145" y="230" class="label">Discord / UI</text>
  <text x="92" y="254" class="text">index.js</text>
  <text x="92" y="274" class="text">button-handlers.js</text>

  <rect class="ui" x="70" y="330" width="220" height="92"/>
  <text x="130" y="360" class="label">Panel / slash UI</text>
  <text x="92" y="384" class="text">music-panel.js</text>
  <text x="92" y="404" class="text">likes-ui.js, ui-components.js</text>

  <text x="70" y="470" class="tiny">Входы: /play, /skip, /stop, /likes,</text>
  <text x="70" y="490" class="tiny">кнопки панели и voiceStateUpdate.</text>

  <!-- Column 2 -->
  <rect class="run" x="360" y="170" width="260" height="110"/>
  <text x="430" y="202" class="label">orchestrator.js</text>
  <text x="384" y="228" class="text">единый commands/events seam</text>
  <text x="384" y="248" class="text">для Discord и будущего API</text>

  <rect class="run" x="360" y="330" width="260" height="110"/>
  <text x="448" y="362" class="label">music.js</text>
  <text x="388" y="388" class="text">facade и use-case orchestration</text>
  <text x="388" y="408" class="text">enqueue / skip / previous / stop</text>

  <!-- Column 3 -->
  <rect class="run" x="700" y="150" width="280" height="120"/>
  <text x="785" y="182" class="label">playback-loop.js</text>
  <text x="722" y="208" class="text">runPlayNext, streamUrl, idle handling</text>
  <text x="722" y="228" class="text">history write on natural finish</text>
  <text x="722" y="248" class="text">guildState owner</text>

  <rect class="run" x="700" y="320" width="130" height="88"/>
  <text x="718" y="350" class="label">queue-manager.js</text>
  <text x="724" y="372" class="text">queue owner</text>

  <rect class="run" x="850" y="320" width="130" height="88"/>
  <text x="866" y="350" class="label">voice-adapter.js</text>
  <text x="876" y="372" class="text">voice owner</text>

  <rect class="run" x="700" y="440" width="130" height="88"/>
  <text x="708" y="470" class="label">player-controller.js</text>
  <text x="726" y="492" class="text">AudioPlayer owner</text>

  <rect class="run" x="850" y="440" width="130" height="88"/>
  <text x="858" y="470" class="label">guild-session-state.js</text>
  <text x="872" y="492" class="text">session state</text>

  <rect class="run" x="700" y="560" width="280" height="82"/>
  <text x="770" y="590" class="label">navigation-stop-flow.js</text>
  <text x="728" y="614" class="text">shared stop path for skip / previous</text>

  <!-- Column 4 -->
  <rect class="search" x="1060" y="150" width="290" height="110"/>
  <text x="1145" y="182" class="label">autoplay-spawn.js</text>
  <text x="1084" y="208" class="text">candidate search / rank / apply</text>
  <text x="1084" y="228" class="text">enqueue into queue-manager</text>

  <rect class="search" x="1060" y="300" width="135" height="88"/>
  <text x="1078" y="330" class="label">autoplay-engine.js</text>
  <text x="1089" y="352" class="text">retrieval policy</text>

  <rect class="search" x="1215" y="300" width="135" height="88"/>
  <text x="1237" y="330" class="label">youtube-search.js</text>
  <text x="1244" y="352" class="text">resolve/search</text>

  <rect class="search" x="1060" y="420" width="135" height="88"/>
  <text x="1072" y="450" class="label">autoplay-prefetch-runner.js</text>
  <text x="1091" y="472" class="text">fast/full prefetch</text>

  <rect class="search" x="1215" y="420" width="135" height="88"/>
  <text x="1260" y="450" class="label">groq.js</text>
  <text x="1237" y="472" class="text">AI retrieval / chat</text>

  <rect class="search" x="1060" y="540" width="290" height="82"/>
  <text x="1132" y="570" class="label">recommendation-bridge.js</text>
  <text x="1090" y="594" class="text">читает music-signals и даёт local boost</text>

  <!-- Column 5 -->
  <rect class="data" x="1430" y="160" width="285" height="96"/>
  <text x="1492" y="190" class="label">db/connection.js + db/migrate.js</text>
  <text x="1454" y="214" class="text">startup barrier: open → migrate → login</text>
  <text x="1454" y="234" class="text">sqlite/postgres migration packs</text>

  <rect class="data" x="1430" y="300" width="135" height="88"/>
  <text x="1450" y="330" class="label">personal-signals.js</text>
  <text x="1460" y="352" class="text">likes facade</text>

  <rect class="data" x="1580" y="300" width="135" height="88"/>
  <text x="1600" y="330" class="label">playback-history.js</text>
  <text x="1608" y="352" class="text">history facade</text>

  <rect class="data" x="1430" y="430" width="135" height="88"/>
  <text x="1458" y="460" class="label">likes-service.js</text>
  <text x="1448" y="482" class="text">soft-fail read/write</text>

  <rect class="data" x="1580" y="430" width="135" height="88"/>
  <text x="1606" y="460" class="label">history-service.js</text>
  <text x="1596" y="482" class="text">normalize + soft-fail</text>

  <rect class="data" x="1430" y="560" width="135" height="88"/>
  <text x="1466" y="590" class="label">repo/likes.js</text>
  <text x="1454" y="612" class="text">raw SQL semantics</text>

  <rect class="data" x="1580" y="560" width="135" height="88"/>
  <text x="1614" y="590" class="label">repo/history.js</text>
  <text x="1594" y="612" class="text">tracks upsert + retention</text>

  <!-- Runtime arrows -->
  <path class="arrow" d="M 290 246 L 360 225"/>
  <path class="arrow" d="M 290 246 L 360 385"/>
  <path class="soft dash" d="M 290 376 L 360 385"/>

  <path class="arrow" d="M 620 225 L 700 210"/>
  <path class="arrow" d="M 620 385 L 700 210"/>
  <path class="arrow" d="M 620 385 L 765 320"/>
  <path class="arrow" d="M 620 385 L 915 320"/>
  <path class="arrow" d="M 620 385 L 915 440"/>
  <path class="arrow" d="M 620 385 L 840 601"/>

  <path class="arrow" d="M 980 210 L 1060 205"/>
  <path class="arrow" d="M 980 210 L 1280 300"/>
  <path class="arrow" d="M 980 210 L 1128 420"/>
  <path class="soft" d="M 1200 344 L 1215 344"/>
  <path class="soft" d="M 1128 344 L 1215 462"/>
  <path class="soft" d="M 1205 581 L 765 601"/>

  <path class="arrow" d="M 1572 208 L 1430 344"/>
  <path class="arrow" d="M 1572 208 L 1648 344"/>
  <path class="arrow" d="M 1498 388 L 1498 430"/>
  <path class="arrow" d="M 1648 388 L 1648 430"/>
  <path class="arrow" d="M 1498 518 L 1498 560"/>
  <path class="arrow" d="M 1648 518 L 1648 560"/>

  <path class="arrow" d="M 220 246 L 1498 344"/>
  <path class="arrow" d="M 765 210 L 1648 344"/>
  <path class="arrow" d="M 840 601 L 1648 344"/>

  <text x="70" y="654" class="tiny">Главная идея: UI не ходит в SQL напрямую. Runtime пишет в БД только через узкие facade → service → repo цепочки.</text>

  <!-- DB area -->
  <rect class="panel" x="38" y="710" width="1724" height="500"/>
  <text x="58" y="744" class="section">2. Database model and read/write paths</text>

  <!-- Tables -->
  <rect class="db" x="72" y="792" width="220" height="120"/>
  <text x="156" y="824" class="label">users</text>
  <text x="92" y="850" class="text">PK: user_id</text>
  <text x="92" y="872" class="text">created_at</text>

  <rect class="db" x="352" y="780" width="315" height="144"/>
  <text x="456" y="812" class="label">track_likes</text>
  <text x="372" y="838" class="text">PK: user_id + provider + provider_track_id</text>
  <text x="372" y="860" class="text">source_url, title, artist, liked_at</text>
  <text x="372" y="892" class="tiny">Denormalized likes read-path for /likes.</text>

  <rect class="db" x="760" y="792" width="250" height="120"/>
  <text x="851" y="824" class="label">tracks</text>
  <text x="780" y="850" class="text">PK: track_key</text>
  <text x="780" y="872" class="text">provider, source_url, title, artist</text>

  <rect class="db" x="1080" y="770" width="380" height="164"/>
  <text x="1216" y="802" class="label">track_plays</text>
  <text x="1100" y="828" class="text">PK: play_id</text>
  <text x="1100" y="850" class="text">FK: user_id → users</text>
  <text x="1100" y="872" class="text">FK: track_key → tracks</text>
  <text x="1100" y="894" class="text">guild_id, session_id, requested_by</text>
  <text x="1100" y="916" class="text">triggered_by, listeners_count, elapsed_ms</text>
  <text x="1100" y="938" class="text">event_type, played_at</text>

  <rect class="db" x="1520" y="792" width="200" height="120"/>
  <text x="1584" y="824" class="label">Backends</text>
  <text x="1540" y="850" class="text">SQLite: dev/test</text>
  <text x="1540" y="872" class="text">Postgres: CI/prod path</text>

  <!-- Table arrows -->
  <path class="arrow" d="M 292 852 L 352 852"/>
  <path class="arrow" d="M 292 852 L 1080 850"/>
  <path class="arrow" d="M 1010 852 L 1080 872"/>
  <path class="soft" d="M 1460 852 L 1520 852"/>

  <!-- Write/read paths -->
  <rect class="ui" x="72" y="1010" width="260" height="86"/>
  <text x="128" y="1040" class="label">Likes path</text>
  <text x="96" y="1066" class="text">❤ button or /likes</text>
  <text x="96" y="1086" class="text">button-handlers.js / index.js</text>

  <rect class="data" x="392" y="1010" width="280" height="86"/>
  <text x="420" y="1040" class="label">personal-signals.js → likes-service.js</text>
  <text x="418" y="1066" class="text">lazy DB bootstrap + soft-fail contract</text>

  <rect class="data" x="732" y="1010" width="220" height="86"/>
  <text x="794" y="1040" class="label">repo/likes.js</text>
  <text x="758" y="1066" class="text">idempotent add/remove/list</text>

  <rect class="ui" x="72" y="1110" width="260" height="86"/>
  <text x="114" y="1140" class="label">History path</text>
  <text x="96" y="1166" class="text">natural finish / skip / previous</text>
  <text x="96" y="1186" class="text">playback-loop.js / navigation-stop-flow.js</text>

  <rect class="data" x="392" y="1110" width="280" height="86"/>
  <text x="416" y="1140" class="label">playback-history.js → history-service.js</text>
  <text x="420" y="1166" class="text">best-effort write, honest attribution only</text>

  <rect class="data" x="732" y="1110" width="220" height="86"/>
  <text x="786" y="1140" class="label">repo/history.js</text>
  <text x="754" y="1166" class="text">upsert tracks + append play + prune</text>

  <text x="1040" y="1030" class="label">Operational rules</text>
  <text x="1040" y="1056" class="text">• guild session state stays in memory, not in DB</text>
  <text x="1040" y="1078" class="text">• likes read path stays simple via track_likes denormalization</text>
  <text x="1040" y="1100" class="text">• history path is append-only into track_plays</text>
  <text x="1040" y="1122" class="text">• per-user retention limits track_plays growth</text>
  <text x="1040" y="1144" class="text">• startup barrier runs open → migrate → login</text>

  <!-- Path arrows -->
  <path class="arrow" d="M 332 1053 L 392 1053"/>
  <path class="arrow" d="M 672 1053 L 732 1053"/>
  <path class="arrow" d="M 952 1053 L 510 924"/>

  <path class="arrow" d="M 332 1153 L 392 1153"/>
  <path class="arrow" d="M 672 1153 L 732 1153"/>
  <path class="arrow" d="M 952 1153 L 885 912"/>
  <path class="arrow" d="M 952 1153 L 1270 934"/>

  <text x="1390" y="1188" class="tiny">Rendered from current code structure on 2026-04-18.</text>
</svg>
